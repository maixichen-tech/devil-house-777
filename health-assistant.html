<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }

        .tab {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.3);
            border: none;
            border-radius: 10px 10px 0 0;
            color: white;
            font-size: 1.05em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active { background: white; color: #667eea; font-weight: bold; }

        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .panel { display: none; }
        .panel.active { display: block; }

        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }

        input[type="text"], input[type="number"], input[type="date"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus { outline: none; border-color: #667eea; }

        button.search-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button.search-btn:hover { transform: scale(1.05); }

        .results { margin-top: 20px; }

        .food-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .food-item:hover { background: #e9ecef; transform: translateX(5px); }

        .nutrient-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .nutrient-card {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .nutrient-card .label { color: #666; font-size: 0.9em; margin-bottom: 5px; }
        .nutrient-card .value { font-size: 1.8em; font-weight: bold; color: #667eea; }
        .nutrient-card .unit { color: #999; font-size: 0.9em; }

        .exercise-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .exercise-card {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .exercise-card:hover { transform: translateY(-5px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3); }
        .exercise-card.selected { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .exercise-card .name { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
        .exercise-card .met { color: #666; font-size: 0.9em; }
        .exercise-card.selected .met { color: rgba(255,255,255,0.8); }

        .calc-result {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            text-align: center;
        }

        .calc-result .calories { font-size: 3em; font-weight: bold; }
        .calc-result .subtitle { opacity: 0.8; }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 100px;
        }

        .portion-info {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .portion-info .label { color: #555; font-size: 0.95em; }
        .portion-info .value { color: #667eea; font-size: 1.2em; font-weight: bold; }

        .portion-toggle { display: flex; gap: 10px; margin-top: 10px; }

        .portion-toggle button {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .portion-toggle button.active { background: #667eea; color: white; }

        .loading { text-align: center; padding: 20px; color: #667eea; }

        .error { background: #fee; color: #c33; padding: 15px; border-radius: 10px; margin-top: 10px; }

        .detail-view { margin-top: 20px; }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-btn {
            padding: 10px 20px;
            background: #e0e0e0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .back-btn:hover { background: #d0d0d0; }

        .record-btn {
            padding: 12px 24px;
            background: #28a745;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }

        .record-btn:hover { transform: scale(1.05); background: #218838; }

        .record-btn.recorded {
            background: #6c757d;
            cursor: default;
        }

        .daily-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }

        .daily-summary .macro-row {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .summary-card {
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
        }

        .summary-card.intake { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .summary-card.burn { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .summary-card.net { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .summary-card.protein { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .summary-card.fat { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .summary-card.carbs { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }

        .summary-card .summary-label { font-size: 0.9em; opacity: 0.9; margin-bottom: 5px; }
        .summary-card .summary-value { font-size: 2.2em; font-weight: bold; }
        .summary-card .summary-unit { font-size: 0.85em; opacity: 0.8; }

        .daily-section { margin-bottom: 25px; }

        .daily-section h3 {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f0f0f0;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .daily-section h3 .badge {
            font-size: 0.75em;
            padding: 3px 10px;
            border-radius: 12px;
            color: white;
            font-weight: normal;
        }

        .badge-food { background: #f5576c; }
        .badge-exercise { background: #4facfe; }

        .record-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .record-row .record-name { font-weight: 500; }
        .record-row .record-detail { color: #888; font-size: 0.85em; margin-top: 3px; }

        .record-row .record-cal {
            font-weight: bold;
            font-size: 1.1em;
            white-space: nowrap;
        }

        .record-cal.intake { color: #f5576c; }
        .record-cal.burn { color: #4facfe; }

        .delete-btn {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 1.2em;
            margin-left: 12px;
            transition: color 0.2s;
        }

        .delete-btn:hover { color: #f5576c; }

        .empty-hint { color: #aaa; font-size: 0.95em; padding: 10px 0; }

        .translate-hint {
            background: #fff8e1;
            border-left: 3px solid #ffb300;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #6d4c00;
        }

        .translate-hint .translated-term { font-weight: bold; color: #e65100; }

        .date-nav {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .date-nav input[type="date"] { flex: 0 0 200px; }

        .date-nav button {
            padding: 10px 18px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .date-nav button:hover { background: #e0e0e0; }
        .date-nav button.today-btn { background: #667eea; color: white; }
        .date-nav button.today-btn:hover { background: #5a6fd6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>健康助手</h1>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('food')">食物营养查询</button>
            <button class="tab" onclick="switchTab('exercise')">运动消耗查询</button>
            <button class="tab" onclick="switchTab('daily')">每日记录</button>
        </div>

        <div class="content">
            <div id="food-panel" class="panel active">
                <div id="food-search">
                    <div class="search-box">
                        <input type="text" id="food-name-input" placeholder="输入食物名称（支持中文，如: 鸡胸肉、米饭、苹果）">
                        <input type="number" id="food-grams-input" placeholder="克数" min="1" value="100" style="flex:0 0 120px;">
                        <span style="display:flex;align-items:center;color:#666;font-size:0.95em;">g</span>
                        <button class="search-btn" onclick="searchFood()">查询</button>
                    </div>
                    <div id="food-results" class="results"></div>
                </div>

                <div id="food-detail" class="detail-view" style="display:none;">
                    <div class="detail-header">
                        <button class="back-btn" onclick="showFoodSearch()">← 返回</button>
                        <h2 id="detail-title"></h2>
                    </div>
                    <div id="portion-info" class="portion-info" style="display:none;">
                        <span class="label">查询份量：</span>
                        <span class="value" id="portion-value"></span>
                    </div>
                    <div class="portion-toggle" id="portion-toggle" style="display:none;">
                        <button onclick="switchPortion(100)">每100g</button>
                        <button onclick="switchPortion(input)" class="active">按输入克数</button>
                    </div>
                    <div id="detail-content"></div>
                    <button id="record-food-btn" class="record-btn" style="display:none;" onclick="recordFoodIntake()">记录今日摄入</button>
                </div>
            </div>

            <div id="exercise-panel" class="panel">
                <div class="input-group">
                    <label>
                        体重 (kg):
                        <input type="number" id="weight" value="70" min="1" max="300">
                    </label>
                    <label>
                        时长 (分钟):
                        <input type="number" id="duration" value="30" min="1" max="600">
                    </label>
                </div>

                <h3>选择运动类型</h3>
                <div id="exercise-list" class="exercise-list"></div>

                <div id="exercise-result" class="calc-result" style="display:none;">
                    <div class="subtitle">预计消耗</div>
                    <div class="calories" id="calories-value">0</div>
                    <div class="subtitle">千卡 (kcal)</div>
                    <button class="record-btn" style="margin-top:15px;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.5);" onclick="recordExercise()">记录今日运动</button>
                </div>
            </div>

            <div id="daily-panel" class="panel">
                <div class="date-nav">
                    <button onclick="changeDate(-1)">← 前一天</button>
                    <input type="date" id="daily-date-input" onchange="renderDailyLog()">
                    <button onclick="changeDate(1)">后一天 →</button>
                    <button class="today-btn" onclick="goToday()">今天</button>
                </div>
                <div id="daily-summary" class="daily-summary"></div>
                <div id="daily-content"></div>
            </div>
        </div>
    </div>

            '宫保鸡丁': 'kung pao chicken', '鱼香肉丝': 'fish flavored shredded pork',
            '麻婆豆腐': 'mapo tofu', '红烧肉': 'braised pork belly',
            '回锅肉': 'twice cooked pork', '糖醋里脊': 'sweet and sour pork',
            '青椒肉丝': 'shredded pork with pepper', '西红柿炒蛋': 'scrambled egg with tomato',
            '番茄炒蛋': 'scrambled egg with tomato', '酸辣土豆丝': 'shredded potato',
            '地三鲜': 'di san xian', '干煸豆角': 'dry fried green bean',
            '水煮鱼': 'boiled fish with chili', '酸菜鱼': 'pickled fish',
            '烤鱼': 'grilled fish', '清蒸鱼': 'steamed fish',
            '小笼包': 'xiaolongbao', '馄饨': 'wonton', '春卷': 'spring roll',
            '炒饭': 'fried rice', '蛋炒饭': 'egg fried rice', '扬州炒饭': 'yangzhou fried rice',
            // 调味/其他
            '酱油': 'soy sauce', '醋': 'vinegar', '糖': 'sugar', '白糖': 'sugar',
            '盐': 'salt', '食用油': 'cooking oil', '橄榄油': 'olive oil',
            '蜂蜜': 'honey', '果酱': 'jam', '巧克力': 'chocolate',
            '冰淇淋': 'ice cream', '蛋糕': 'cake', '饼干': 'cookie', '面包干': 'cracker',
            '薯片': 'potato chips'
        };

        function hasChinese(str) {
            return /[一-龥]/.test(str);
        }

        function translateFoodName(input) {
            const trimmed = input.trim();
            if (!hasChinese(trimmed)) return { query: trimmed, translated: false, original: trimmed };
            if (foodDict[trimmed]) return { query: foodDict[trimmed], translated: true, original: trimmed };
            for (const cn of Object.keys(foodDict)) {
                if (trimmed.includes(cn) || cn.includes(trimmed)) {
                    return { query: foodDict[cn], translated: true, original: trimmed, matched: cn };
                }
            }
            return { query: trimmed, translated: false, original: trimmed };
        }

        function todayStr() {
            return new Date().toISOString().slice(0, 10);
        }

        function loadAllLogs() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            } catch { return {}; }
        }

        function saveAllLogs(logs) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
        }

        function getDayLog(dateStr) {
            const logs = loadAllLogs();
            return logs[dateStr] || { foods: [], exercises: [] };
        }

        function addToDayLog(dateStr, entry, type) {
            const logs = loadAllLogs();
            if (!logs[dateStr]) logs[dateStr] = { foods: [], exercises: [] };
            if (type === 'food') {
                logs[dateStr].foods.push({ ...entry, id: Date.now() });
            } else {
                logs[dateStr].exercises.push({ ...entry, id: Date.now() });
            }
            saveAllLogs(logs);
        }

        function deleteFromDayLog(dateStr, type, id) {
            const logs = loadAllLogs();
            if (!logs[dateStr]) return;
            logs[dateStr][type + 's'] = logs[dateStr][type + 's'].filter(e => e.id !== id);
            if (!logs[dateStr].foods.length && !logs[dateStr].exercises.length) delete logs[dateStr];
            saveAllLogs(logs);
            renderDailyLog();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

            const tabMap = { food: 0, exercise: 1, daily: 2 };
            const panelMap = { food: 'food-panel', exercise: 'exercise-panel', daily: 'daily-panel' };

            document.querySelectorAll('.tab')[tabMap[tab]].classList.add('active');
            document.getElementById(panelMap[tab]).classList.add('active');

            if (tab === 'daily') {
                document.getElementById('daily-date-input').value = todayStr();
                renderDailyLog();
            }
        }

        async function searchFood() {
            const rawName = document.getElementById('food-name-input').value.trim();
            const grams = parseFloat(document.getElementById('food-grams-input').value) || 100;

            if (!rawName) { alert('请输入食物名称'); return; }

            inputPortion = grams;
            currentPortion = inputPortion;

            const { query, translated, original, matched } = translateFoodName(rawName);

            const resultsDiv = document.getElementById('food-results');
            let hintHtml = '';
            if (translated) {
                hintHtml = `<div class="translate-hint">已为您将「${matched || original}」翻译为 <span class="translated-term">${query}</span> 进行查询</div>`;
            } else if (hasChinese(rawName)) {
                hintHtml = `<div class="translate-hint">未找到「${original}」的翻译，将以原文查询。建议尝试常见中文名（如"鸡胸肉""米饭"）或直接输入英文。</div>`;
            }

            resultsDiv.innerHTML = hintHtml + '<div class="loading">搜索中...</div>';

            try {
                const url = `${BASE_URL}/foods/search?query=${encodeURIComponent(query)}&pageSize=10&api_key=${API_KEY}`;
                resultsDiv.innerHTML = hintHtml + '<div class="loading">搜索中...（正在请求: ' + url.substring(0, 80) + '...）</div>';

                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ' ' + response.statusText);
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error('API 错误: ' + data.error.message);
                }

                if (data.foods && data.foods.length > 0) {
                    resultsDiv.innerHTML = hintHtml + data.foods.map(food => `
                        <div class="food-item" onclick="showFoodDetail(${food.fdcId})">
                            <strong>${food.description}</strong>
                            <div style="color:#666; font-size:0.9em; margin-top:5px;">
                                ${food.brandOwner || food.dataType || ''}
                            </div>
                        </div>
                    `).join('');
                } else {
                    resultsDiv.innerHTML = hintHtml + '<div class="error">未找到相关食物' + (translated ? '，可尝试换一种英文名' : '') + '</div>';
                }
            } catch (error) {
                let errorDetail = error.message;
                if (error.name === 'TypeError' && error.message.includes('fetch')) {
                    errorDetail = '网络连接失败，可能是：1) iPhone 无法访问外网 2) 网络超时 3) CORS 被阻止';
                }
                resultsDiv.innerHTML = `<div class="error">
                    <strong>查询失败</strong><br>
                    错误: ${errorDetail}<br>
                    <small>查询词: "${query}" | 时间: ${new Date().toLocaleString()}</small>
                </div>`;
            }
        }

        async function showFoodDetail(fdcId) {
            document.getElementById('food-search').style.display = 'none';
            document.getElementById('food-detail').style.display = 'block';

            const contentDiv = document.getElementById('detail-content');
            contentDiv.innerHTML = '<div class="loading">加载详细信息...</div>';
            document.getElementById('record-food-btn').style.display = 'none';

            try {
                const response = await fetch(`${BASE_URL}/food/${fdcId}?api_key=${API_KEY}`);
                const food = await response.json();

                document.getElementById('detail-title').textContent = food.description;
                currentFoodInfo = { fdcId, description: food.description };

                const nutrientMap = {
                    1008: { label: '热量', unit: 'kcal' },
                    1003: { label: '蛋白质', unit: 'g' },
                    1004: { label: '脂肪', unit: 'g' },
                    1005: { label: '碳水化合物', unit: 'g' },
                    1079: { label: '膳食纤维', unit: 'g' },
                    1063: { label: '糖', unit: 'g' },
                    1093: { label: '钠', unit: 'mg' },
                    1087: { label: '钙', unit: 'mg' },
                    1089: { label: '铁', unit: 'mg' },
                    1092: { label: '钾', unit: 'mg' },
                    1162: { label: '维生素C', unit: 'mg' }
                };

                const nutrients = food.foodNutrients || food.nutrients || [];
                if (!nutrients.length) {
                    contentDiv.innerHTML = `<div class="error">该食物暂无营养数据</div>`;
                    return;
                }

                currentFoodNutrients = {};
                nutrients.forEach(n => {
                    const nutrientId = n.nutrientId || (n.nutrient && n.nutrient.id);
                    const value = n.value !== undefined ? n.value : n.amount;
                    if (nutrientId && nutrientMap[nutrientId] && value !== undefined) {
                        currentFoodNutrients[nutrientId] = {
                            label: nutrientMap[nutrientId].label,
                            valuePer100g: value,
                            unit: nutrientMap[nutrientId].unit
                        };
                    }
                });

                document.getElementById('portion-info').style.display = 'flex';
                document.getElementById('portion-toggle').style.display = 'flex';
                document.getElementById('portion-value').textContent = inputPortion + 'g';

                renderNutrients();
                document.getElementById('record-food-btn').style.display = 'inline-block';
            } catch (error) {
                contentDiv.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
            }
        }

        function switchPortion(type) {
            const buttons = document.querySelectorAll('.portion-toggle button');
            buttons.forEach(btn => btn.classList.remove('active'));

            if (type === 100) {
                currentPortion = 100;
                buttons[0].classList.add('active');
                document.getElementById('portion-value').textContent = '100g';
            } else {
                currentPortion = inputPortion;
                buttons[1].classList.add('active');
                document.getElementById('portion-value').textContent = inputPortion + 'g';
            }

            renderNutrients();
        }

        function renderNutrients() {
            const contentDiv = document.getElementById('detail-content');
            const multiplier = currentPortion / 100;

            contentDiv.innerHTML = `
                <div class="nutrient-grid">
                    ${Object.values(currentFoodNutrients).map(n => {
                        const value = (n.valuePer100g * multiplier).toFixed(1);
                        return `
                            <div class="nutrient-card">
                                <div class="label">${n.label}</div>
                                <div class="value">${value}</div>
                                <div class="unit">${n.unit}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function showFoodSearch() {
            document.getElementById('food-search').style.display = 'block';
            document.getElementById('food-detail').style.display = 'none';
            document.getElementById('portion-info').style.display = 'none';
            document.getElementById('portion-toggle').style.display = 'none';
            document.getElementById('record-food-btn').style.display = 'none';
            currentFoodNutrients = {};
            currentFoodInfo = null;
            currentPortion = 100;
        }

        function recordFoodIntake() {
            if (!currentFoodInfo || !Object.keys(currentFoodNutrients).length) return;

            const multiplier = currentPortion / 100;
            const calNutrient = currentFoodNutrients[1008];
            const proteinNutrient = currentFoodNutrients[1003];
            const fatNutrient = currentFoodNutrients[1004];
            const carbsNutrient = currentFoodNutrients[1005];

            const calories = calNutrient ? Math.round(calNutrient.valuePer100g * multiplier) : 0;
            const protein = proteinNutrient ? parseFloat((proteinNutrient.valuePer100g * multiplier).toFixed(1)) : 0;
            const fat = fatNutrient ? parseFloat((fatNutrient.valuePer100g * multiplier).toFixed(1)) : 0;
            const carbs = carbsNutrient ? parseFloat((carbsNutrient.valuePer100g * multiplier).toFixed(1)) : 0;

            addToDayLog(todayStr(), {
                name: currentFoodInfo.description,
                grams: currentPortion,
                calories: calories,
                protein: protein,
                fat: fat,
                carbs: carbs
            }, 'food');

            const btn = document.getElementById('record-food-btn');
            btn.textContent = '已记录!';
            btn.classList.add('recorded');
            setTimeout(() => {
                btn.textContent = '记录今日摄入';
                btn.classList.remove('recorded');
            }, 2000);
        }

        function initExercises() {
            const listDiv = document.getElementById('exercise-list');
            listDiv.innerHTML = exercises.map((ex, index) => `
                <div class="exercise-card" onclick="selectExercise(${index})">
                    <div class="name">${ex.name}</div>
                    <div class="met">MET: ${ex.met}</div>
                </div>
            `).join('');
        }

        function selectExercise(index) {
            selectedExercise = exercises[index];

            document.querySelectorAll('.exercise-card').forEach((card, i) => {
                card.classList.toggle('selected', i === index);
            });

            calculateCalories();
        }

        function calculateCalories() {
            if (!selectedExercise) return;

            const weight = parseFloat(document.getElementById('weight').value) || 70;
            const duration = parseFloat(document.getElementById('duration').value) || 30;

            const calories = selectedExercise.met * weight * (duration / 60);

            document.getElementById('calories-value').textContent = Math.round(calories);
            document.getElementById('exercise-result').style.display = 'block';
        }

        function recordExercise() {
            if (!selectedExercise) return;

            const weight = parseFloat(document.getElementById('weight').value) || 70;
            const duration = parseFloat(document.getElementById('duration').value) || 30;
            const calories = Math.round(selectedExercise.met * weight * (duration / 60));

            addToDayLog(todayStr(), {
                name: selectedExercise.name,
                duration: duration,
                weight: weight,
                calories: calories
            }, 'exercise');

            alert('已记录到今日运动!');
        }

        function changeDate(delta) {
            const input = document.getElementById('daily-date-input');
            const d = new Date(input.value || todayStr());
            d.setDate(d.getDate() + delta);
            input.value = d.toISOString().slice(0, 10);
            renderDailyLog();
        }

        function goToday() {
            document.getElementById('daily-date-input').value = todayStr();
            renderDailyLog();
        }

        function renderDailyLog() {
            const dateStr = document.getElementById('daily-date-input').value || todayStr();
            const log = getDayLog(dateStr);

            const totalIntake = log.foods.reduce((s, f) => s + (f.calories || 0), 0);
            const totalBurn = log.exercises.reduce((s, e) => s + (e.calories || 0), 0);
            const net = totalIntake - totalBurn;
            const totalProtein = log.foods.reduce((s, f) => s + (f.protein || 0), 0);
            const totalFat = log.foods.reduce((s, f) => s + (f.fat || 0), 0);
            const totalCarbs = log.foods.reduce((s, f) => s + (f.carbs || 0), 0);

            document.getElementById('daily-summary').innerHTML = `
                <div class="summary-card intake">
                    <div class="summary-label">总摄入</div>
                    <div class="summary-value">${totalIntake}</div>
                    <div class="summary-unit">kcal</div>
                </div>
                <div class="summary-card burn">
                    <div class="summary-label">总消耗</div>
                    <div class="summary-value">${totalBurn}</div>
                    <div class="summary-unit">kcal</div>
                </div>
                <div class="summary-card net">
                    <div class="summary-label">净热量</div>
                    <div class="summary-value">${net}</div>
                    <div class="summary-unit">kcal</div>
                </div>
                <div class="macro-row">
                    <div class="summary-card protein">
                        <div class="summary-label">蛋白质</div>
                        <div class="summary-value">${totalProtein.toFixed(1)}</div>
                        <div class="summary-unit">g</div>
                    </div>
                    <div class="summary-card fat">
                        <div class="summary-label">脂肪</div>
                        <div class="summary-value">${totalFat.toFixed(1)}</div>
                        <div class="summary-unit">g</div>
                    </div>
                    <div class="summary-card carbs">
                        <div class="summary-label">碳水</div>
                        <div class="summary-value">${totalCarbs.toFixed(1)}</div>
                        <div class="summary-unit">g</div>
                    </div>
                </div>
            `;

            let html = '';

            html += '<div class="daily-section"><h3>食物摄入 <span class="badge badge-food">' + log.foods.length + ' 项</span></h3>';
            if (!log.foods.length) {
                html += '<div class="empty-hint">暂无记录，去「食物营养查询」添加吧</div>';
            } else {
                log.foods.forEach(f => {
                    html += `
                        <div class="record-row">
                            <div>
                                <div class="record-name">${escapeHtml(f.name)}</div>
                                <div class="record-detail">${f.grams}g · 蛋白${f.protein || 0}g · 脂肪${f.fat || 0}g · 碳水${f.carbs || 0}g</div>
                            </div>
                            <div style="display:flex;align-items:center;">
                                <span class="record-cal intake">+${f.calories} kcal</span>
                                <button class="delete-btn" onclick="deleteFromDayLog('${dateStr}','food',${f.id})" title="删除">&times;</button>
                            </div>
                        </div>
                    `;
                });
            }
            html += '</div>';

            html += '<div class="daily-section"><h3>运动消耗 <span class="badge badge-exercise">' + log.exercises.length + ' 项</span></h3>';
            if (!log.exercises.length) {
                html += '<div class="empty-hint">暂无记录，去「运动消耗查询」添加吧</div>';
            } else {
                log.exercises.forEach(e => {
                    html += `
                        <div class="record-row">
                            <div>
                                <div class="record-name">${escapeHtml(e.name)}</div>
                                <div class="record-detail">${e.duration}分钟 / ${e.weight}kg</div>
                            </div>
                            <div style="display:flex;align-items:center;">
                                <span class="record-cal burn">-${e.calories} kcal</span>
                                <button class="delete-btn" onclick="deleteFromDayLog('${dateStr}','exercise',${e.id})" title="删除">&times;</button>
                            </div>
                        </div>
                    `;
                });
            }
            html += '</div>';

            document.getElementById('daily-content').innerHTML = html;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.getElementById('weight').addEventListener('input', calculateCalories);
        document.getElementById('duration').addEventListener('input', calculateCalories);

        document.getElementById('food-name-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchFood();
        });
        document.getElementById('food-grams-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchFood();
        });

        initExercises();
    </script>
</body>
</html>
